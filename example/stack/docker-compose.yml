version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: vault_db
      POSTGRES_USER: vault_user
      POSTGRES_PASSWORD: vault_pass
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vault_user -d vault_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ../../..
      dockerfile: aq_data_layer/example/stack/server/Dockerfile
    ports:
      - "8765:8765"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: vault_db
      DB_USER: vault_user
      DB_PASSWORD: vault_pass
      SERVER_PORT: 8765
    depends_on:
      postgres:
        condition: service_healthy

  scenarios:
    build:
      context: ../../..
      dockerfile: aq_data_layer/example/stack/console_client/Dockerfile.scenarios
    environment:
      VAULT_ENDPOINT: http://server:8765
    depends_on:
      - server
    profiles:
      - run

  client:
    build:
      context: ../../..
      dockerfile: aq_data_layer/example/stack/console_client/Dockerfile.client
      args:
        ENTRY: main.dart
    environment:
      VAULT_ENDPOINT: http://server:8765
    depends_on:
      - server
    profiles:
      - run

  client_comprehensive:
    build:
      context: ../../..
      dockerfile: aq_data_layer/example/stack/console_client/Dockerfile.client
      args:
        ENTRY: main_comprehensive.dart
    environment:
      VAULT_ENDPOINT: http://server:8765
    depends_on:
      - server
    profiles:
      - run

  client_soft_delete:
    build:
      context: ../../..
      dockerfile: aq_data_layer/example/stack/console_client/Dockerfile.client
      args:
        ENTRY: main_soft_delete_test.dart
    environment:
      VAULT_ENDPOINT: http://server:8765
    depends_on:
      - server
    profiles:
      - run

  client_no_cleanup:
    build:
      context: ../../..
      dockerfile: aq_data_layer/example/stack/console_client/Dockerfile.client
      args:
        ENTRY: main_no_cleanup.dart
    environment:
      VAULT_ENDPOINT: http://server:8765
    depends_on:
      - server
    profiles:
      - run
