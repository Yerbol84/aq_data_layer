services:
  postgres:
    image: pgvector/pgvector:pg15
    environment:
      POSTGRES_DB: vault_db
      POSTGRES_USER: vault_user
      POSTGRES_PASSWORD: vault_pass
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vault_user -d vault_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "ollama list || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  server:
    build:
      context: ../../..
      dockerfile: aq_data_layer/example/stack/server/Dockerfile
    ports:
      - "8765:8765"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: vault_db
      DB_USER: vault_user
      DB_PASSWORD: vault_pass
      SERVER_PORT: 8765
      ARTIFACT_PATH: /data/artifacts
      SECURITY_MODE: mock
      VECTOR_DIM: 768
      VECTOR_EMBEDDER_ID: ollama-nomic-embed-text
    volumes:
      - artifacts_data:/data/artifacts
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_healthy
    restart: unless-stopped

  scenarios:
    build:
      context: ../../..
      dockerfile: aq_data_layer/example/stack/console_client/Dockerfile.scenarios
    environment:
      VAULT_ENDPOINT: http://server:8765
    depends_on:
      - server
    profiles:
      - run

  stress:
    build:
      context: ../../..
      dockerfile: aq_data_layer/example/stack/console_client/Dockerfile.stress
    environment:
      VAULT_ENDPOINT: http://server:8765
