version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: vault_db
      POSTGRES_USER: vault_user
      POSTGRES_PASSWORD: vault_pass
    ports:
      - "5432:5432"
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vault_user -d vault_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ../../..
      dockerfile: dart_vault_package/example/stack/server/Dockerfile
    ports:
      - "8765:8765"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: vault_db
      DB_USER: vault_user
      DB_PASSWORD: vault_pass
      SERVER_PORT: 8765
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
